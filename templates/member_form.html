{% extends 'base.html' %}
{% block content %}

<div class="row justify-content-center">
<div class="col-md-8">
    <div class="card shadow">
        <div class="card-header bg-dark text-white">
            <h4 class="mb-0"><i class="bi bi-person-plus"></i> {{ action }} Member</h4>
        </div>
        <div class="card-body">
            <form method="POST">
                <div class="row g-3">
                    <div class="col-md-6">
                        <label class="form-label">First Name *</label>
                        <input type="text" name="first_name" class="form-control"
                               value="{{ member.first_name if member else '' }}" required>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Last Name *</label>
                        <input type="text" name="last_name" class="form-control"
                               value="{{ member.last_name if member else '' }}" required>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Email *</label>
                        <input type="email" name="email" class="form-control"
                               value="{{ member.email if member else '' }}" required>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Phone</label>
                        <input type="text" name="phone" class="form-control"
                               value="{{ member.phone if member else '' }}">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Date of Birth *</label>
                        <input type="date" name="date_of_birth" class="form-control"
                               value="{{ member.date_of_birth if member else '' }}" required>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Membership Type</label>
                        <select name="membership_type" class="form-select">
                            {% for t in ['basic', 'standard', 'premium'] %}
                            <option value="{{ t }}"
                                {% if member and member.membership_type == t %}selected{% endif %}>
                                {{ t | capitalize }}
                            </option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Membership Start Date *</label>
                        <input type="date" name="membership_start_date" class="form-control"
                               value="{{ member.membership_start_date if member else '' }}" required>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Membership End Date *</label>
                        <input type="date" name="membership_end_date" class="form-control"
                               value="{{ member.membership_end_date if member else '' }}" required>
                    </div>
                    <div class="col-md-12">
                        <label class="form-label">Assigned Trainer (optional)</label>
                        <select name="trainer_id" class="form-select">
                            <option value="">-- No Trainer --</option>
                            {% for t in trainers %}
                            <option value="{{ t.trainer_id }}"
                                {% if member and member.trainer_id == t.trainer_id %}selected{% endif %}>
                                {{ t.first_name }} {{ t.last_name }} — {{ t.speciality }}
                            </option>
                            {% endfor %}
                        </select>
                    </div>
                </div>
                <div class="mt-4">
                    <button type="submit" class="btn btn-primary">
                        <i class="bi bi-check-circle"></i> {{ action }} Member
                    </button>
                    <a href="{{ url_for('members') }}" class="btn btn-secondary ms-2">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</div>
</div>

{% endblock %}
